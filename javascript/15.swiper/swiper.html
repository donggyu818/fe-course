<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swiper</title>
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
    <script src="swiper.js"></script>
    <link rel="stylesheet" href="swiper.css">
</head>
<body>
    <!-- Slider main container -->
<div class="swiper">
    <!-- Additional required wrapper -->
    <div class="swiper-wrapper">
    <!-- Slides -->
    <div class="swiper-slide"><img src="../../images/swiper/img1.jpg" alt="swiper Img1" class="swiper-img"></div>
    <div class="swiper-slide"><img src="../../images/swiper/img2.jpg" alt="swiper Img2" class="swiper-img"></div>
    <div class="swiper-slide"><img src="../../images/swiper/img3.jpg" alt="swiper Img3" class="swiper-img"></div>
    </div>
    <!-- If we need pagination -->
    <div class="swiper-pagination"></div>

    <!-- If we need navigation buttons -->
    <div class="swiper-button-prev swiper-button-color"></div>
    <div class="swiper-button-next swiper-button-color"></div>

    <!-- If we need scrollbar -->
    <div class="swiper-scrollbar"></div>
</div>
</body>
</html>
