<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter</title>
    <script src="counter.js"></script>  <!-- import 가 이거임. 이것만 있으면 js 와 연계되어 함수 활용 가능. -->
</head>
<body>
    <h1>Counter</h1>
    <div>
        <h2 id="number">0</h2>
        <button type="button" onclick="counter('+')">increment(+)</button>
        <button type="button" onclick="counter('-')">decrement(-)</button>
    </div>
</body>
</html>
